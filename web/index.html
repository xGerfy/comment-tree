<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Комментарии</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI",
          Roboto, sans-serif;
        background: #f5f5f7;
        color: #1d1d1f;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      h1 {
        font-size: 40px;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #1d1d1f;
        margin-bottom: 32px;
        text-align: center;
      }

      /* Search Box */
      .search-box {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: saturate(180%) blur(20px);
        border-radius: 12px;
        padding: 8px;
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }

      .search-box input {
        flex: 1;
        padding: 12px 16px;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        background: transparent;
        color: #1d1d1f;
        outline: none;
      }

      .search-box input::placeholder {
        color: #86868b;
      }

      .search-box button {
        padding: 12px 20px;
        background: #0071e3;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
      }

      .search-box button:hover {
        background: #0077ed;
        transform: scale(1.02);
      }

      /* New Comment Form */
      .new-comment {
        background: #ffffff;
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 24px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }

      .new-comment h3 {
        font-size: 17px;
        font-weight: 600;
        margin-bottom: 16px;
        color: #1d1d1f;
      }

      .new-comment input,
      .new-comment textarea {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid #e5e5e5;
        border-radius: 10px;
        margin-bottom: 12px;
        font-size: 15px;
        font-family: inherit;
        background: #fafafa;
        color: #1d1d1f;
        outline: none;
        transition: all 0.2s ease;
      }

      .new-comment input:focus,
      .new-comment textarea:focus {
        border-color: #0071e3;
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
      }

      .new-comment textarea {
        min-height: 100px;
        resize: vertical;
      }

      .new-comment button {
        padding: 12px 24px;
        background: #0071e3;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
      }

      .new-comment button:hover {
        background: #0077ed;
        transform: scale(1.02);
      }

      /* Comments List */
      .comments-list {
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        border: 1px solid rgba(0, 0, 0, 0.05);
        overflow: hidden;
      }

      .comment {
        padding: 20px 24px;
        border-bottom: 1px solid #f0f0f0;
        transition: background 0.2s ease;
      }

      .comment:last-child {
        border-bottom: none;
      }

      .comment:hover {
        background: #fafafa;
      }

      .comment-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .comment-author {
        font-weight: 600;
        font-size: 15px;
        color: #1d1d1f;
      }

      .comment-date {
        font-size: 12px;
        color: #86868b;
        font-weight: 400;
      }

      .comment-content {
        color: #3a3a3c;
        font-size: 15px;
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .comment-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .comment-actions button {
        padding: 6px 12px;
        font-size: 13px;
        font-weight: 500;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s ease;
        background: #f0f0f0;
        color: #3a3a3c;
      }

      .comment-actions button:hover {
        background: #0071e3;
        color: white;
      }

      .comment-actions .btn-delete:hover {
        background: #ff3b30;
        color: white;
      }

      /* Replies */
      .replies {
        margin-left: 32px;
        border-left: 2px solid #e5e5e5;
        padding-left: 20px;
      }

      .reply-form {
        background: #fafafa;
        padding: 16px;
        border-radius: 10px;
        margin-top: 12px;
      }

      .reply-form input,
      .reply-form textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        margin-bottom: 10px;
        font-size: 14px;
        font-family: inherit;
        background: #ffffff;
        outline: none;
        transition: all 0.2s ease;
      }

      .reply-form input:focus,
      .reply-form textarea:focus {
        border-color: #0071e3;
        box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
      }

      .reply-form textarea {
        min-height: 70px;
      }

      .reply-form button {
        padding: 8px 16px;
        background: #0071e3;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        margin-right: 8px;
        transition: all 0.2s ease;
      }

      .reply-form button:hover {
        background: #0077ed;
      }

      .reply-form button.cancel {
        background: #f0f0f0;
        color: #3a3a3c;
      }

      .reply-form button.cancel:hover {
        background: #ff3b30;
        color: white;
      }

      /* No Comments */
      .no-comments {
        text-align: center;
        color: #86868b;
        padding: 60px 20px;
        font-size: 15px;
      }

      /* Pagination */
      .pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        margin-top: 24px;
      }

      .pagination button {
        padding: 10px 20px;
        background: #ffffff;
        color: #0071e3;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
      }

      .pagination button:hover:not(:disabled) {
        background: #0071e3;
        color: white;
        border-color: #0071e3;
      }

      .pagination button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      #pageInfo {
        color: #86868b;
        font-size: 14px;
        font-weight: 500;
      }

      /* Loading & Error */
      .loading {
        text-align: center;
        padding: 40px;
        color: #86868b;
      }

      .error {
        background: #fff5f5;
        color: #ff3b30;
        padding: 14px 18px;
        border-radius: 10px;
        margin-bottom: 16px;
        font-size: 14px;
      }

      /* Responsive */
      @media (max-width: 600px) {
        .container {
          padding: 24px 16px;
        }

        h1 {
          font-size: 28px;
        }

        .replies {
          margin-left: 16px;
          padding-left: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Комментарии</h1>

      <div class="search-box">
        <input type="text" id="searchQuery" placeholder="Поиск..." />
        <button onclick="searchComments()">Найти</button>
      </div>

      <div class="new-comment">
        <h3>Добавить комментарий</h3>
        <input type="text" id="newAuthor" placeholder="Ваше имя" />
        <textarea
          id="newContent"
          placeholder="Напишите что-нибудь..."
        ></textarea>
        <button onclick="addComment()">Опубликовать</button>
      </div>

      <div id="commentsContainer" class="comments-list">
        <div class="loading">Загрузка...</div>
      </div>

      <div class="pagination">
        <button id="prevBtn" onclick="prevPage()" disabled>← Назад</button>
        <span id="pageInfo"></span>
        <button id="nextBtn" onclick="nextPage()">Вперед →</button>
      </div>
    </div>

    <script>
      let currentPage = 0;
      const limit = 20;
      let currentSearch = null;
      let hasMorePages = true;

      document.addEventListener("DOMContentLoaded", () => {
        loadComments();
      });

      async function loadComments() {
        const container = document.getElementById("commentsContainer");
        container.innerHTML = '<div class="loading">Загрузка...</div>';

        try {
          const url = currentSearch
            ? "/api/comments/search"
            : `/api/comments?limit=${limit + 1}&offset=${currentPage * limit}`;

          const response = await fetch(url, {
            method: currentSearch ? "POST" : "GET",
            headers: { "Content-Type": "application/json" },
            body: currentSearch
              ? JSON.stringify({
                  query: currentSearch,
                  limit,
                  offset: currentPage * limit,
                })
              : null,
          });

          const data = await response.json();

          if (data.error) {
            container.innerHTML = `<div class="error">${data.error}</div>`;
            return;
          }

          let comments = data.comments || [];

          hasMorePages = comments.length > limit;
          if (hasMorePages) {
            comments = comments.slice(0, -1);
          }

          if (comments.length === 0) {
            container.innerHTML =
              '<div class="no-comments">Нет комментариев. Будьте первым!</div>';
            document.getElementById("pageInfo").textContent = "";
            updatePaginationButtons();
            return;
          }

          container.innerHTML = "";
          comments.forEach((comment) => {
            container.appendChild(renderComment(comment));
          });

          document.getElementById("pageInfo").textContent =
            `Страница ${currentPage + 1}`;
          updatePaginationButtons();
        } catch (error) {
          container.innerHTML = `<div class="error">Ошибка: ${error.message}</div>`;
        }
      }

      function renderComment(comment) {
        const div = document.createElement("div");
        div.className = "comment";
        div.id = `comment-${comment.id}`;

        const date = new Date(comment.created_at).toLocaleString("ru-RU", {
          day: "numeric",
          month: "long",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });

        div.innerHTML = `
                <div class="comment-header">
                    <span class="comment-author">${escapeHtml(comment.author)}</span>
                    <span class="comment-date">${date}</span>
                </div>
                <div class="comment-content">${escapeHtml(comment.content)}</div>
                <div class="comment-actions">
                    <button class="btn-reply" onclick="toggleReplyForm(${comment.id})">Ответить</button>
                    <button class="btn-delete" onclick="deleteComment(${comment.id})">Удалить</button>
                </div>
                <div id="reply-form-${comment.id}" class="reply-form" style="display: none;">
                    <input type="text" id="reply-author-${comment.id}" placeholder="Ваше имя">
                    <textarea id="reply-content-${comment.id}" placeholder="Текст ответа..."></textarea>
                    <button onclick="submitReply(${comment.id})">Отправить</button>
                    <button class="cancel" onclick="toggleReplyForm(${comment.id})">Отмена</button>
                </div>
            `;

        if (comment.children && comment.children.length > 0) {
          const repliesDiv = document.createElement("div");
          repliesDiv.className = "replies";
          comment.children.forEach((child) => {
            repliesDiv.appendChild(renderComment(child));
          });
          div.appendChild(repliesDiv);
        }

        return div;
      }

      async function addComment() {
        const author = document.getElementById("newAuthor").value.trim();
        const content = document.getElementById("newContent").value.trim();

        if (!author || !content) {
          alert("Заполните имя и текст комментария");
          return;
        }

        try {
          const response = await fetch("/api/comments", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ author, content }),
          });

          const data = await response.json();

          if (data.error) {
            alert(`Ошибка: ${data.error}`);
            return;
          }

          document.getElementById("newAuthor").value = "";
          document.getElementById("newContent").value = "";
          currentPage = 0;
          loadComments();
        } catch (error) {
          alert(`Ошибка: ${error.message}`);
        }
      }

      function toggleReplyForm(parentId) {
        const form = document.getElementById(`reply-form-${parentId}`);
        form.style.display = form.style.display === "none" ? "block" : "none";
      }

      async function submitReply(parentId) {
        const author = document
          .getElementById(`reply-author-${parentId}`)
          .value.trim();
        const content = document
          .getElementById(`reply-content-${parentId}`)
          .value.trim();

        if (!author || !content) {
          alert("Заполните имя и текст ответа");
          return;
        }

        try {
          const body = { author, content };
          if (parentId && parentId !== 0) {
            body.parent_id = parentId;
          }

          const response = await fetch("/api/comments", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });

          const data = await response.json();

          if (data.error) {
            alert(`Ошибка: ${data.error}`);
            return;
          }

          toggleReplyForm(parentId);
          loadComments();
        } catch (error) {
          alert(`Ошибка: ${error.message}`);
        }
      }

      async function deleteComment(id) {
        if (
          !confirm("Вы уверены? Это удалит комментарий и все ответы на него.")
        ) {
          return;
        }

        try {
          const response = await fetch(`/api/comments/${id}`, {
            method: "DELETE",
          });

          const data = await response.json();

          if (data.error) {
            alert(`Ошибка: ${data.error}`);
            return;
          }

          loadComments();
        } catch (error) {
          alert(`Ошибка: ${error.message}`);
        }
      }

      async function searchComments() {
        const query = document.getElementById("searchQuery").value.trim();

        if (!query) {
          currentSearch = null;
          loadComments();
          return;
        }

        currentSearch = query;
        currentPage = 0;
        loadComments();
      }

      document
        .getElementById("searchQuery")
        .addEventListener("keypress", (e) => {
          if (e.key === "Enter") {
            searchComments();
          }
        });

      function prevPage() {
        if (currentPage > 0) {
          currentPage--;
          loadComments();
        }
      }

      function nextPage() {
        currentPage++;
        loadComments();
      }

      function updatePaginationButtons() {
        document.getElementById("prevBtn").disabled = currentPage === 0;
        document.getElementById("nextBtn").disabled = !hasMorePages;
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }
    </script>
  </body>
</html>
